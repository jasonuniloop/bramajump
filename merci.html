<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Message envoyé | Bramajump</title>
  <link href="/assets/vendor/fonts-local.css" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      display: grid;
      min-height: 100vh;
      margin: 0;
      padding: 24px;
      place-items: center;
      color: #201210;
      background: #f3ead8;
      font-family: Montserrat, Arial, sans-serif;
      text-align: center;
    }

    main {
      width: min(560px, 100%);
    }

    h1 {
      margin: 0 0 18px;
      font-family: Oswald, Arial, sans-serif;
      font-size: clamp(40px, 8vw, 64px);
      line-height: 1;
      text-transform: uppercase;
    }

    p {
      margin: 0 auto 28px;
      max-width: 480px;
      font-size: 17px;
      line-height: 1.6;
    }

    a {
      display: inline-flex;
      min-height: 46px;
      align-items: center;
      justify-content: center;
      padding: 0 20px;
      border-radius: 6px;
      color: #fff;
      background: #e65100;
      font-weight: 800;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>Message envoyé</h1>
    <p>Merci, ta demande a bien été transmise à l'équipe Bramajump. Nous te répondrons dès que possible.</p>
    <a href="/#demande">Retour au site</a>
  </main>
</body>
</html>
