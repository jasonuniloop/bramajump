<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Message envoyé | Bramajump</title>
  <link href="/assets/vendor/fonts-local.css" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      display: grid;
      min-height: 100vh;
      margin: 0;
      padding: 24px;
      place-items: center;
      color: #f8f1e6;
      background:
        linear-gradient(rgba(32, 18, 16, .76), rgba(32, 18, 16, .88)),
        url("/assets/images/hero-background.webp") center / cover;
      font-family: Montserrat, Arial, sans-serif;
      text-align: center;
    }

    main {
      width: min(600px, 100%);
      padding: clamp(32px, 6vw, 56px);
      background: rgba(32, 18, 16, .9);
      border: 1px solid rgba(255, 255, 255, .16);
      box-shadow: 0 24px 70px rgba(0, 0, 0, .28);
    }

    .mark {
      display: grid;
      width: 58px;
      height: 58px;
      margin: 0 auto 22px;
      place-items: center;
      color: #201210;
      background: #efb16c;
      border-radius: 999px;
      font-size: 30px;
      font-weight: 900;
    }

    h1 {
      margin: 0 0 18px;
      color: #fff;
      font-family: Oswald, Arial, sans-serif;
      font-size: clamp(42px, 8vw, 68px);
      line-height: 1;
      text-transform: uppercase;
    }

    p {
      max-width: 480px;
      margin: 0 auto 28px;
      font-size: 17px;
      line-height: 1.65;
    }

    a {
      display: inline-flex;
      min-height: 48px;
      align-items: center;
      justify-content: center;
      padding: 0 22px;
      color: #fff;
      background: #e65100;
      font-weight: 900;
      text-decoration: none;
      text-transform: uppercase;
    }

    a:hover,
    a:focus-visible {
      background: #c94300;
    }
  </style>
</head>
<body>
  <main>
    <div class="mark" aria-hidden="true">✓</div>
    <h1>Message envoyé</h1>
    <p>Merci, votre demande a bien été transmise à l'équipe Bramajump. Nous vous répondrons dès que possible.</p>
    <a href="/#demande">Retour au site</a>
  </main>
</body>
</html>
